<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>The Brain — GPT-2 Small w Wasm</title>
  <style>
    body { font-family: monospace; max-width: 640px; margin: 2rem auto; padding: 0 1rem; }
    h1   { font-size: 1.2rem; }
    input, button { font-family: monospace; font-size: 1rem; }
    input  { width: 100%; box-sizing: border-box; padding: .4rem; margin: .5rem 0; }
    button { padding: .4rem 1.2rem; cursor: pointer; }
    #output { margin-top: 1rem; min-height: 3rem; white-space: pre-wrap; background: #f5f5f5; padding: .5rem; }
    #tps    { color: #888; font-size: .85rem; margin-top: .3rem; }
    #status { color: #555; font-size: .85rem; margin: .5rem 0; }
  </style>
</head>
<body>
  <h1>The Brain — GPT-2 Small (124M) w WebAssembly</h1>
  <div id="status">Inicjalizacja…</div>
  <input id="prompt" type="text" value="The brain is" placeholder="Wpisz prompt…">
  <button id="btn" disabled>Generuj</button>
  <div id="output"></div>
  <div id="tps"></div>
  <script type="module" src="./app.js"></script>
</body>
</html>
